<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lewo</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%237A5CFF'/%3E%3Ccircle cx='11' cy='11' r='7' fill='%23FF5CA8' opacity='.8'/%3E%3Ccircle cx='21' cy='19' r='6' fill='%23F0B45A' opacity='.8'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A12;--bg-2:#13111F;--panel:rgba(255,255,255,.03);
    --ink:#ECEAF4;--muted:#8B87A3;--line:rgba(255,255,255,.08);
    --amber:#F0B45A;--violet:#7A5CFF;--magenta:#FF5CA8;--teal:#34E1C4;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;
    overflow:hidden;-webkit-font-smoothing:antialiased}
  /* ambient aurora background */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(60% 45% at 78% 8%,rgba(122,92,255,.18),transparent 60%),
      radial-gradient(55% 40% at 12% 100%,rgba(255,92,168,.14),transparent 60%),
      radial-gradient(50% 40% at 95% 90%,rgba(52,225,196,.08),transparent 60%)}
  a{color:inherit}

  /* ---------- ORB ---------- */
  .orb{position:relative;border-radius:50%;overflow:hidden;background:#0E0C1C;flex:0 0 auto;
    box-shadow:0 0 70px -8px rgba(122,92,255,.55),inset 0 0 40px rgba(255,255,255,.05);
    animation:breathe 6s ease-in-out infinite}
  .orb .b{position:absolute;border-radius:50%;filter:blur(20px);mix-blend-mode:screen;opacity:.95}
  .orb .b1{inset:-18% -18% auto auto;width:85%;height:85%;background:radial-gradient(circle,var(--violet),transparent 68%);animation:drift 11s ease-in-out infinite}
  .orb .b2{inset:auto auto -20% -14%;width:80%;height:80%;background:radial-gradient(circle,var(--magenta),transparent 66%);animation:drift 13s ease-in-out infinite reverse}
  .orb .b3{inset:auto -12% -8% auto;width:70%;height:70%;background:radial-gradient(circle,var(--amber),transparent 64%);animation:drift 9s ease-in-out infinite}
  .orb .b4{inset:-8% auto auto -12%;width:60%;height:60%;background:radial-gradient(circle,var(--teal),transparent 62%);animation:drift 15s ease-in-out infinite reverse}
  .orb::after{content:"";position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(38% 34% at 32% 26%,rgba(255,255,255,.5),transparent 60%);opacity:.5}
  .orb.busy{animation:breathe 2.4s ease-in-out infinite}
  .orb.busy .b{animation-duration:3.5s}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
  @keyframes drift{0%,100%{transform:translate(0,0) rotate(0)}33%{transform:translate(9%,-7%) rotate(40deg)}66%{transform:translate(-7%,8%) rotate(-30deg)}}

  /* ---------- console ---------- */
  .wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;height:100dvh;height:100vh;
    display:flex;flex-direction:column;padding:0 24px}
  .presence{display:flex;flex-direction:column;align-items:center;text-align:center;padding:34px 0 18px;gap:10px}
  .presence .orb{width:92px;height:92px}
  .presence .name{font-family:"Bricolage Grotesque";font-weight:800;font-size:22px;letter-spacing:-.02em;line-height:1}
  .presence .status{font-family:"IBM Plex Mono",monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
    display:flex;align-items:center;gap:8px}
  .presence .status .led{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal)}
  .presence.busy .status .led{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .newbtn{position:absolute;top:26px;right:24px;font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);background:transparent;border:1px solid var(--line);padding:8px 13px;border-radius:999px;cursor:pointer;transition:.2s}
  .newbtn:hover{color:var(--ink);border-color:rgba(255,255,255,.25)}

  .canvas{flex:1;overflow-y:auto;padding:8px 2px 20px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
  .canvas::-webkit-scrollbar{width:7px}.canvas::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:10px}

  .intro{color:var(--muted);text-align:center;font-size:15.5px;line-height:1.6;max-width:44ch;margin:12vh auto 0}
  .intro b{color:var(--ink);font-weight:600}

  .entry{padding:24px 0;border-top:1px solid var(--line);animation:rise .5s cubic-bezier(.2,.7,.2,1)}
  .entry:first-child{border-top:0}
  .tag{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .tag.you{color:var(--amber)}
  .tag.lewo{color:var(--violet)}
  .q-text{font-size:17px;line-height:1.5;color:var(--ink);font-weight:500;margin-bottom:22px}
  .a-wrap{position:relative;padding-left:20px}
  .a-wrap::before{content:"";position:absolute;left:0;top:2px;bottom:2px;width:2px;border-radius:2px;
    background:linear-gradient(var(--violet),var(--magenta),var(--amber))}
  .a-text{font-size:16px;line-height:1.72;white-space:pre-wrap;word-wrap:break-word;color:#DEDCEC}
  .shimmer{display:inline-flex;gap:6px;align-items:center;height:24px}
  .shimmer i{width:7px;height:7px;border-radius:50%;background:var(--violet);opacity:.5;animation:pulse 1s infinite}
  .shimmer i:nth-child(2){background:var(--magenta);animation-delay:.15s}
  .shimmer i:nth-child(3){background:var(--amber);animation-delay:.3s}
  @keyframes pulse{0%,60%,100%{opacity:.35;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* command bar */
  .bar-wrap{position:relative;padding:14px 0 26px}
  .bar-wrap::before{content:"";position:absolute;left:0;right:0;top:-40px;height:40px;
    background:linear-gradient(transparent,var(--bg));pointer-events:none}
  .bar{display:flex;align-items:flex-end;gap:10px;background:var(--bg-2);border:1px solid var(--line);
    border-radius:20px;padding:8px 8px 8px 18px;box-shadow:0 20px 50px -30px #000,0 0 0 1px rgba(122,92,255,.06)}
  .bar:focus-within{border-color:rgba(122,92,255,.45);box-shadow:0 0 0 3px rgba(122,92,255,.14)}
  .caret{font-family:"IBM Plex Mono",monospace;color:var(--violet);font-size:20px;line-height:44px;flex:0 0 auto;user-select:none}
  .bar textarea{flex:1;background:transparent;border:0;color:var(--ink);font-family:"Inter";font-size:16px;
    resize:none;max-height:150px;line-height:1.5;padding:12px 0;outline:none}
  .bar textarea::placeholder{color:var(--muted)}
  .go{flex:0 0 auto;width:44px;height:44px;border:0;border-radius:14px;cursor:pointer;color:#1a1206;
    background:linear-gradient(135deg,var(--amber),#e79a3f);display:flex;align-items:center;justify-content:center;
    transition:transform .15s,filter .2s}
  .go:hover{filter:brightness(1.08)}.go:active{transform:scale(.93)}
  .go:disabled{opacity:.45;cursor:not-allowed}
  .foot{text-align:center;font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.08em;color:var(--muted);opacity:.7;margin-top:12px}

  /* ---------- access gate ---------- */
  .gate{position:fixed;inset:0;z-index:20;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;gap:8px}
  .gate::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(50% 40% at 50% 32%,rgba(122,92,255,.18),transparent 60%),radial-gradient(40% 30% at 70% 90%,rgba(255,92,168,.12),transparent 60%)}
  .gate.hide{display:none}
  .gate .orb{width:150px;height:150px;margin-bottom:14px;position:relative;z-index:1}
  .gate h1{position:relative;z-index:1;font-family:"Bricolage Grotesque";font-weight:800;font-size:40px;margin:0;letter-spacing:-.02em}
  .gate .sub{position:relative;z-index:1;font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:0 0 22px}
  .gate form{position:relative;z-index:1;width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px}
  .gate input{padding:15px 18px;border-radius:14px;border:1px solid var(--line);background:var(--bg-2);color:var(--ink);
    font-family:"IBM Plex Mono",monospace;font-size:15px;text-align:center;letter-spacing:.12em}
  .gate input::placeholder{color:var(--muted);letter-spacing:.16em}
  .gate input:focus{outline:none;border-color:rgba(122,92,255,.5);box-shadow:0 0 0 3px rgba(122,92,255,.14)}
  .gate button{padding:15px;border-radius:14px;border:0;cursor:pointer;color:#1a1206;font-family:"Inter";font-weight:600;font-size:15px;
    background:linear-gradient(135deg,var(--amber),#e79a3f);transition:filter .2s}
  .gate button:hover{filter:brightness(1.07)}.gate button:disabled{opacity:.6;cursor:wait}
  .gate .err{min-height:20px;font-size:13px;color:#FFA9A0;font-family:"Inter"}

  @media(max-width:600px){
    .wrap{padding:0 18px}
    .presence{padding:28px 0 14px}.presence .orb{width:78px;height:78px}
    .newbtn{top:22px;right:18px}
    .q-text{font-size:16px}.a-text{font-size:15.5px}
    .gate .orb{width:120px;height:120px}.gate h1{font-size:34px}
  }
  @media(prefers-reduced-motion:reduce){
    .orb,.orb .b,.orb.busy,.orb.busy .b{animation:none!important}
    .shimmer i{animation:none}.entry{animation:none}
  }
</style>
</head>
<body>

  <!-- ACCESS GATE -->
  <div class="gate" id="gate">
    <div class="orb"><div class="b b1"></div><div class="b b2"></div><div class="b b3"></div><div class="b b4"></div></div>
    <h1>Lewo</h1>
    <p class="sub">Sven's persoonlijke AI</p>
    <form id="gateForm">
      <input id="codeInput" type="password" placeholder="toegangscode" autocomplete="off" required>
      <button type="submit" id="gateBtn">Verbind</button>
      <div class="err" id="gateErr"></div>
    </form>
  </div>

  <!-- CONSOLE -->
  <div class="wrap">
    <button class="newbtn" id="newbtn">Nieuw</button>
    <div class="presence" id="presence">
      <div class="orb" id="orb"><div class="b b1"></div><div class="b b2"></div><div class="b b3"></div><div class="b b4"></div></div>
      <div class="name">Lewo</div>
      <div class="status"><span class="led"></span><span id="statusText">klaar</span></div>
    </div>

    <div class="canvas" id="canvas">
      <div class="intro" id="intro">Ik ben <b>Lewo</b>. Stel me een vraag, vraag me iets te schrijven, uit te leggen of te bedenken — typ hieronder.</div>
    </div>

    <div class="bar-wrap">
      <form class="bar" id="form">
        <span class="caret">&rsaquo;</span>
        <textarea id="input" rows="1" placeholder="Vraag Lewo iets..."></textarea>
        <button class="go" id="send" type="submit" aria-label="Versturen">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </form>
      <div class="foot">LEWO · powered by Claude · controleer wat belangrijk is</div>
    </div>
  </div>

<script>
  var gate=document.getElementById('gate'),gateForm=document.getElementById('gateForm'),
      codeInput=document.getElementById('codeInput'),gateBtn=document.getElementById('gateBtn'),gateErr=document.getElementById('gateErr'),
      canvas=document.getElementById('canvas'),intro=document.getElementById('intro'),
      form=document.getElementById('form'),input=document.getElementById('input'),send=document.getElementById('send'),
      newbtn=document.getElementById('newbtn'),orb=document.getElementById('orb'),
      presence=document.getElementById('presence'),statusText=document.getElementById('statusText');

  var CODE=sessionStorage.getItem('lewo_code')||'';
  var history=[];

  function setBusy(on){
    orb.classList.toggle('busy',on);
    presence.classList.toggle('busy',on);
    statusText.textContent=on?'denkt na':'klaar';
    send.disabled=on;
  }

  function addEntry(question){
    if(intro) {intro.remove();intro=null;}
    var e=document.createElement('div');e.className='entry';
    e.innerHTML='<div class="tag you">&rsaquo; jij</div>'+
                '<div class="q-text"></div>'+
                '<div class="tag lewo">&#9679; lewo</div>'+
                '<div class="a-wrap"><div class="a-text"><span class="shimmer"><i></i><i></i><i></i></span></div></div>';
    e.querySelector('.q-text').textContent=question;
    canvas.appendChild(e);
    canvas.scrollTop=canvas.scrollHeight;
    return e.querySelector('.a-text');
  }

  async function verify(code){
    try{var r=await fetch('/api/chat',{method:'POST',
      headers:{'content-type':'application/json','x-lewo-code':code},
      body:JSON.stringify({probe:true})});return r.ok;}catch(e){return false;}
  }
  function openConsole(){gate.classList.add('hide');input.focus();}
  (async function(){if(CODE && await verify(CODE)) openConsole();})();

  gateForm.addEventListener('submit',async function(e){
    e.preventDefault();var code=codeInput.value.trim();if(!code)return;
    gateBtn.disabled=true;gateErr.textContent='';
    var ok=await verify(code);gateBtn.disabled=false;
    if(ok){CODE=code;sessionStorage.setItem('lewo_code',code);openConsole();}
    else{gateErr.textContent='Onjuiste code. Vraag Sven om toegang.';codeInput.select();}
  });

  input.addEventListener('input',function(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,150)+'px';});
  input.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();form.requestSubmit();}});

  newbtn.addEventListener('click',function(){
    history=[];canvas.innerHTML='';
    intro=document.createElement('div');intro.className='intro';
    intro.innerHTML='Nieuw gesprek. Waarmee kan ik je helpen?';
    canvas.appendChild(intro);input.focus();
  });

  form.addEventListener('submit',async function(e){
    e.preventDefault();var text=input.value.trim();if(!text)return;
    var target=addEntry(text);
    history.push({role:'user',content:text});
    input.value='';input.style.height='auto';setBusy(true);

    try{
      var r=await fetch('/api/chat',{method:'POST',
        headers:{'content-type':'application/json','x-lewo-code':CODE},
        body:JSON.stringify({messages:history})});
      if(r.status===401){setBusy(false);sessionStorage.removeItem('lewo_code');
        gate.classList.remove('hide');gateErr.textContent='Je toegang is verlopen. Vul opnieuw een code in.';return;}
      var data=await r.json();setBusy(false);
      if(data.reply){target.textContent=data.reply;history.push({role:'assistant',content:data.reply});}
      else{target.textContent='Sorry, er ging iets mis. Probeer het straks opnieuw.';}
    }catch(err){setBusy(false);target.textContent='Ik kan Lewo even niet bereiken. Probeer het later opnieuw.';}
    finally{canvas.scrollTop=canvas.scrollHeight;input.focus();}
  });
</script>
</body>
</html>
